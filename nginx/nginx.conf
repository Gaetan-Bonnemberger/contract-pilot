# =============================================================================
# nginx.conf — Reverse proxy pour Contract Pilot
#
# Place ce fichier dans nginx/nginx.conf (déjà configuré dans docker-compose.prod.yml)
#
# Ce fichier configure :
#   - Redirection automatique HTTP → HTTPS
#   - Proxy vers l'application Next.js (port 3000)
#   - Rate limiting sur les routes d'authentification
#   - Compression gzip
#   - Cache des fichiers statiques
#   - En-têtes de sécurité supplémentaires
#
# Pour les certificats SSL :
#   Option A (recommandé) — Let's Encrypt avec Certbot :
#     docker run --rm -v ./nginx/ssl:/etc/letsencrypt certbot/certbot certonly \
#       --standalone -d monserveur.example.com
#
#   Option B — Certificat auto-signé (test interne uniquement) :
#     mkdir -p nginx/ssl
#     openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#       -keyout nginx/ssl/privkey.pem -out nginx/ssl/fullchain.pem \
#       -subj "/CN=contract-pilot"
# =============================================================================

# Limite de taux par IP (zone mémoire partagée de 10 MB)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/s;

upstream app {
    server app:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Health check accessible en HTTP (pour le monitoring Docker)
    location /api/health {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # ── Certificats SSL ──────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Paramètres SSL modernes
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Limites uploads ───────────────────────────────────────────────────────
    client_max_body_size 52m;  # Fichiers PDF jusqu'à 50 Mo

    # ── Compression gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_vary on;

    # ── En-têtes de sécurité (complétés par Next.js) ─────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Rate limiting sur l'authentification ─────────────────────────────────
    location /api/auth/callback/credentials {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Cache des fichiers statiques Next.js ──────────────────────────────────
    location /_next/static/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache 1 an (Next.js génère des noms de fichiers avec hash)
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_bypass $http_upgrade;
    }

    # ── Route principale ──────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";

        # Timeouts généreux pour l'analyse IA (peut prendre 60+ s)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
